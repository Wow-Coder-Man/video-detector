<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 340px; font-family: Arial, sans-serif; padding: 12px; margin: 0; background-color: #fdfdfd; }
    h3 { margin-top: 0; color: #222; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; text-align: center; }
    .status { font-size: 13px; margin-bottom: 12px; }
    textarea { width: 100%; height: 85px; box-sizing: border-box; resize: none; margin-bottom: 10px; font-family: monospace; font-size: 11px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; background: #fafafa; }
    
    /* 核心依赖下载区样式 */
    .links-box { background: #f1f3f5; border: 1px dashed #ced4da; border-radius: 4px; padding: 8px; margin-bottom: 12px; }
    .links-title { font-size: 11px; font-weight: bold; color: #495057; margin-bottom: 6px; }
    .tool-link { display: inline-block; font-size: 11px; color: #007bff; text-decoration: none; margin-right: 10px; cursor: pointer; }
    .tool-link:hover { text-decoration: underline; color: #0056b3; }
    
    button { width: 100%; padding: 10px; background-color: #ff5a00; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
    button:hover { background-color: #e04f00; }
  </style>
</head>
<body>
  <h3>全能视频下载命令助手</h3>
  <div id="status" class="status">正在扫描页面网络请求...</div>
  <textarea id="cmdOutput" placeholder="终端命令将在此处生成..." readonly></textarea>
  
  <!-- 新增：核心工具链高速链接入口 -->
  <div class="links-box">
    <div class="links-title">⚙️ 核心运行环境依赖下载 (去 Releases 页面下载 Windows 版):</div>
    <span class="tool-link" data-url="https://github.com/nilaoda/N_m3u8DL-RE/releases">1. N_m3u8DL-RE</span>
    <span class="tool-link" data-url="https://github.com/yt-dlp/yt-dlp/releases">2. yt-dlp</span>
    <span class="tool-link" data-url="https://github.com/denoland/deno/releases">3. deno</span>
  </div>

  <button id="copyBtn">复制运行命令</button>

  <script src="popup.js"></script>
</body>
</html>
